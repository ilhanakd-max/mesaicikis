<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İş Çıkış Saatlerim</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            height: fit-content;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 5px;
            margin-top: 0;
        }

        p.subtitle {
            text-align: center;
            font-size: 0.9em;
            color: #666;
            margin-bottom: 25px;
        }

        .day-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .day-row:last-of-type {
            border-bottom: none;
            margin-bottom: 20px;
        }

        .day-label {
            font-weight: 600;
            font-size: 1.1em;
        }

        input[type="time"] {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 1.1em;
            font-family: inherit;
            color: var(--primary-color);
            background: #f9f9f9;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        input[type="time"]:focus {
            border-color: var(--primary-color);
            background: #fff;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-reset {
            background-color: #ff6b6b;
            color: white;
        }
        
        .btn-save-indicator {
            background-color: #51cf66;
            color: white;
            display: none; /* JS ile gösterilecek */
        }

        /* Kaydedildi animasyonu */
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
        }

        .toast.show {
            animation: fadeInOut 2s forwards;
        }

    </style>
</head>
<body>

    <div class="container">
        <h2>Çıkış Saati Takip</h2>
        <p class="subtitle">Saatleri gir, otomatik kaydedilsin.</p>
        
        <div id="days-container">
            </div>

        <div class="btn-container">
            <button class="btn-reset" onclick="confirmReset()">Yeni Hafta (Temizle)</button>
        </div>
    </div>

    <div id="toast" class="toast">Kaydedildi!</div>

    <script>
        const days = [
            "Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi", "Pazar"
        ];
        
        const container = document.getElementById('days-container');
        const STORAGE_KEY = 'haftalik_cikis_saatleri';

        // 1. Sayfa yüklendiğinde verileri çek ve arayüzü oluştur
        window.onload = function() {
            renderDays();
            loadData();
        };

        // Arayüzü oluşturma fonksiyonu
        function renderDays() {
            container.innerHTML = '';
            days.forEach((day, index) => {
                const div = document.createElement('div');
                div.className = 'day-row';
                
                const label = document.createElement('label');
                label.className = 'day-label';
                label.innerText = day;
                label.setAttribute('for', 'day-' + index);

                const input = document.createElement('input');
                input.type = 'time';
                input.id = 'day-' + index;
                input.dataset.dayIndex = index;
                
                // Her değişiklikte kaydet
                input.addEventListener('change', (e) => {
                    saveData(index, e.target.value);
                });

                div.appendChild(label);
                div.appendChild(input);
                container.appendChild(div);
            });
        }

        // Veriyi LocalStorage'a kaydetme
        function saveData(index, value) {
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            data[index] = value;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            showToast();
        }

        // Veriyi LocalStorage'dan çekme
        function loadData() {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
            if (data) {
                Object.keys(data).forEach(key => {
                    const input = document.getElementById('day-' + key);
                    if (input) {
                        input.value = data[key];
                    }
                });
            }
        }

        // Verileri Sıfırlama (Yeni Hafta)
        function confirmReset() {
            if(confirm("Tüm saatler silinecek ve yeni haftaya başlanacak. Emin misin?")) {
                localStorage.removeItem(STORAGE_KEY);
                // Inputları temizle
                const inputs = document.querySelectorAll('input[type="time"]');
                inputs.forEach(input => input.value = '');
            }
        }

        // "Kaydedildi" bildirimi
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('show');
            void toast.offsetWidth; // Animasyonu resetlemek için hack
            toast.classList.add('show');
        }
    </script>

</body>
</html>
